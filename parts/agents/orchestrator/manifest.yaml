# agent-orchestrator — the coordinator. One intake becomes a fleet operation:
# triage routes it, specialists assess risk and spend in the same trace, and a
# governed sourcing event runs to award. One run_id, one audit chain, one cost rollup.
api_version: steel/v1
name: agent-orchestrator
description: >
  Procurement coordinator: triages an intake, fans out to risk and spend specialists
  over the mesh (A2A), then runs a governed sourcing event — all under one shared trace.
autonomy_level: 3
pipeline: orchestrate
model:
  group: reasoning
  max_tokens: 512
  budget_usd_per_task: 0.40
prompt:
  path: prompts/orchestrator.md
  version: "1"
skills: [procure.orchestrate]
mandate:
  max_spend_usd: 250000
  notes: Inherits the sourcing mandate; the governor enforces it at award time.
metrics:
  eval_pass_rate: 0.90
  max_policy_violations: 0
