name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: steel
          POSTGRES_PASSWORD: steel
          POSTGRES_DB: steel
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U steel -d steel"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_URL: postgresql://steel:steel@localhost:5433/steel
      STEEL_MOCK: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-packages --dev
      - run: psql "$POSTGRES_URL" -c 'CREATE EXTENSION IF NOT EXISTS vector;' -c 'CREATE SCHEMA IF NOT EXISTS blackbox; CREATE SCHEMA IF NOT EXISTS meter; CREATE SCHEMA IF NOT EXISTS cortex; CREATE SCHEMA IF NOT EXISTS engine; CREATE SCHEMA IF NOT EXISTS foundry; CREATE SCHEMA IF NOT EXISTS registry;'
      - run: uv run ruff check .
      - run: uv run lint-imports
      - run: uv run pytest
