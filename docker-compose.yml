name: steel

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: steel
      POSTGRES_PASSWORD: steel
      POSTGRES_DB: steel
    ports:
      - "${STEEL_POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steel -d steel"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      # LITELLM_CONFIG_FILE=config.mock.yaml gives a fully keyless gateway (see .env.example)
      - ./infra/litellm/${LITELLM_CONFIG_FILE:-config.yaml}:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-steel-master-dev}
      DATABASE_URL: postgresql://steel:steel@postgres:5432/litellm
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STORE_MODEL_IN_DB: "false"
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health/liveliness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
