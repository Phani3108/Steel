# jai-gateway — KEYLESS MOCK configuration
#
# Same model groups as config.yaml, but every deployment short-circuits with a
# config-level mock_response — LiteLLM never contacts a provider, so the full
# HTTP path (auth, routing, metering tags, usage accounting) works with zero keys.
# Selected by setting LITELLM_CONFIG_FILE=config.mock.yaml (the .env default).
#
# Note: per-request mock_response in the body is NOT honored by the proxy
# (verified 2026-06-12) — config-level is the supported mock path.

model_list:
  - model_name: reasoning
    litellm_params:
      model: openai/mock-reasoning
      api_key: mock
      mock_response: "ECHO: Hello from the JAI gateway (mock mode — no provider keys configured)."

  - model_name: reasoning-max
    litellm_params:
      model: openai/mock-reasoning-max
      api_key: mock
      mock_response: "MOCK[reasoning-max]: escalation tier response."

  - model_name: fast
    litellm_params:
      model: openai/mock-fast
      api_key: mock
      mock_response: "PASS: mock judge verdict."

litellm_settings:
  num_retries: 0
  request_timeout: 30

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
